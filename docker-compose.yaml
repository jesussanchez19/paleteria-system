version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: edahisnacke/laravel_app_php
    container_name: laravel_app_php
    restart: always
    env_file:
      - .env
    volumes:
      - .:/var/www
    networks:
      - laravel_network
  web:
    image: nginx:stable-alpine
    container_name: laravel_app_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel_network

networks:
  laravel_network:
    driver: bridge