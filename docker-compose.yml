services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paleteria_app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - db
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
    command: bash -lc "php-fpm"

  web:
    image: nginx:alpine
    container_name: paleteria_web
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: postgres:16
    container_name: paleteria_db
    environment:
      POSTGRES_DB: paleteria_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data

  node:
    image: node:20-alpine
    container_name: paleteria_node
    working_dir: /var/www
    volumes:
      - ./:/var/www
    command: sh -c "npm install && npm run build"
    profiles:
      - build

volumes:
  dbdata:
